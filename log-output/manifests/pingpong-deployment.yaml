apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: exercises
  name: ping-pong-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      # volumes:
      #   - name: shared-data
      #     persistentVolumeClaim:
      #       claimName: data-claim
      containers:
        - name: ping-pong
          image: europe-north1-docker.pkg.dev/dwk-gke-502612/dwk-repository/ping-pong:v1
          imagePullPolicy: IfNotPresent
          # volumeMounts:
          # - name: shared-data
          #   mountPath: /usr/src/app/files
          env:
          - name: POSTGRES_HOST
            value: postgres-svc
          - name: POSTGRES_PORT
            value: "5432"
          - name: POSTGRES_USER
            value: postgres
          - name: POSTGRES_PASSWORD
            value: example-password
          - name: POSTGRES_DB
            value: postgres