apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ping-pong-cpu-analysis
  namespace: exercises
spec:
  metrics:
    - name: namespace-cpu-usage
      initialDelay: 2m
      successCondition: result[0] < 0.05
      provider:
        prometheus:
          address: http://prom-prometheus-server.monitoring.svc.cluster.local
          query: |
            sum(
              rate(
                container_cpu_usage_seconds_total{
                  namespace="exercises",
                  container!=""
                }[5m]
              )
            )