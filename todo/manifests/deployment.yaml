apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: project
  name: todo-app-dep
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: todo-data-claim
      containers:
        - name: todo-app
          image: PROJECT/TODO-APP
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          env:
            - name: PORT
              value: "3000"
            - name: IMAGE_URL
              value: "https://picsum.photos/1200"
            - name: cacheTime
              value: "600000"
          volumeMounts: 
            - name: data
              mountPath: /usr/src/app/files



