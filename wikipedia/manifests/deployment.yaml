apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikipedia-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wikipedia
  template:
    metadata:
      labels:
        app: wikipedia
    spec:
      initContainers:
        - name: wikipedia-init
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Downloading the Kubernetes Wikipedia page"
              curl -L https://en.wikipedia.org/wiki/Kubernetes \
                -o /usr/share/nginx/html/index.html

          volumeMounts:
            - name: wikipedia-data
              mountPath: /usr/share/nginx/html

      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80

          volumeMounts:
            - name: wikipedia-data
              mountPath: /usr/share/nginx/html

        - name: wikipedia-sidecar
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              while true
              do
                WAIT_TIME=$(awk 'BEGIN { srand(); print int(300 + rand() * 601) }')

                echo "Waiting ${WAIT_TIME} seconds before downloading a random page"
                sleep "$WAIT_TIME"

                echo "Downloading a random Wikipedia page"
                curl -L https://en.wikipedia.org/wiki/Special:Random \
                  -o /usr/share/nginx/html/index.html
              done

          volumeMounts:
            - name: wikipedia-data
              mountPath: /usr/share/nginx/html

      volumes:
        - name: wikipedia-data
          emptyDir: {}

          