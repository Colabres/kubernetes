name: Todo GitOps

on:
  push:
    branches:
      - main
    paths:
      - "todo/**"
      - ".github/workflows/todo-gitops.yaml"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push todo-app
        uses: docker/build-push-action@v6
        with:
          context: ./todo/todo-app
          push: true
          tags: ghcr.io/colabres/todo-app:${{ env.IMAGE_TAG }}

      - name: Build and push todo-backend
        uses: docker/build-push-action@v6
        with:
          context: ./todo/todo-backend
          push: true
          tags: ghcr.io/colabres/todo-backend:${{ env.IMAGE_TAG }}

      - name: Build and push todo-generator
        uses: docker/build-push-action@v6
        with:
          context: ./todo/todo-generator
          push: true
          tags: ghcr.io/colabres/todo-generator:${{ env.IMAGE_TAG }}

      - name: Build and push todo-broadcaster
        uses: docker/build-push-action@v6
        with:
          context: ./todo/broadcaster
          push: true
          tags: ghcr.io/colabres/todo-broadcaster:${{ env.IMAGE_TAG }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image versions
        run: |
          cd todo
          kustomize edit set image PROJECT/TODO-APP=ghcr.io/colabres/todo-app:${{ env.IMAGE_TAG }}
          kustomize edit set image PROJECT/TODO-BACKEND=ghcr.io/colabres/todo-backend:${{ env.IMAGE_TAG }}
          kustomize edit set image PROJECT/TODO-GENERATOR=ghcr.io/colabres/todo-generator:${{ env.IMAGE_TAG }}
          kustomize edit set image PROJECT/BROADCASTER=ghcr.io/colabres/todo-broadcaster:${{ env.IMAGE_TAG }}

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add todo/kustomization.yaml
          git commit -m "Update Todo image versions [skip ci]" || echo "No changes to commit"
          git push