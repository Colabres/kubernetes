name: Release application

on:
  push:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}
  GKE_CLUSTER: dwk-cluster
  GKE_ZONE: europe-north1-b
  REGISTRY: europe-north1-docker.pkg.dev
  REPOSITORY: dwk-repository
  TODO_APP_IMAGE: todo-app
  TODO_BACKEND_IMAGE: todo-backend
  TODO_GENERATOR_IMAGE: todo-generator
  BRANCH: ${{ github.ref_name }}

jobs:
  build-publish-deploy:
    name: Build, Publish and Deploy
    runs-on: ubuntu-latest
    environment: GKE_PROJECT

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}"
          service_account: "${{ secrets.SERVICE_ACCOUNT }}"

      - name: 'Set up Cloud SDK'
        uses: google-github-actions/setup-gcloud@v3

      - name: 'Use gcloud CLI'
        run: gcloud info

      - name: Configure Docker
        run: gcloud --quiet auth configure-docker $REGISTRY

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          project_id: ${{ env.PROJECT_ID }}
          location: ${{ env.GKE_ZONE }}

      - name: Form image names
        run: |
          echo "TODO_APP_IMAGE_TAG=$REGISTRY/$PROJECT_ID/$REPOSITORY/$TODO_APP_IMAGE:$BRANCH-$GITHUB_SHA" >> $GITHUB_ENV
          echo "TODO_BACKEND_IMAGE_TAG=$REGISTRY/$PROJECT_ID/$REPOSITORY/$TODO_BACKEND_IMAGE:$BRANCH-$GITHUB_SHA" >> $GITHUB_ENV
          echo "TODO_GENERATOR_IMAGE_TAG=$REGISTRY/$PROJECT_ID/$REPOSITORY/$TODO_GENERATOR_IMAGE:$BRANCH-$GITHUB_SHA" >> $GITHUB_ENV

      - name: Build todo-app
        run: docker build --tag $TODO_APP_IMAGE_TAG ./todo/todo-app

      - name: Push todo-app
        run: docker push $TODO_APP_IMAGE_TAG

      - name: Build todo-backend
        run: docker build --tag $TODO_BACKEND_IMAGE_TAG ./todo/todo-backend

      - name: Push todo-backend
        run: docker push $TODO_BACKEND_IMAGE_TAG

      - name: Build todo-generator
        run: docker build --tag $TODO_GENERATOR_IMAGE_TAG ./todo/todo-generator

      - name: Push todo-generator
        run: docker push $TODO_GENERATOR_IMAGE_TAG





      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Deploy
        working-directory: ./todo
        run: |
          kustomize edit set image PROJECT/TODO-APP=$TODO_APP_IMAGE_TAG
          kustomize edit set image PROJECT/TODO-BACKEND=$TODO_BACKEND_IMAGE_TAG
          kustomize edit set image PROJECT/TODO-GENERATOR=$TODO_GENERATOR_IMAGE_TAG

          kustomize build . | kubectl apply -f -

          kubectl rollout status deployment/todo-app-dep -n project
          kubectl rollout status deployment/todo-backend-dep -n project