name: Log Output GitOps

on:
  push:
    branches:
      - main
    paths:
      - "log-output/**"
      - ".github/workflows/log-output-gitops.yaml"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push log-writer
        uses: docker/build-push-action@v6
        with:
          context: ./log-output/log-writer
          push: true
          tags: ghcr.io/colabres/log-writer:${{ env.IMAGE_TAG }}

      - name: Build and push log-reader
        uses: docker/build-push-action@v6
        with:
          context: ./log-output/log-reader
          push: true
          tags: ghcr.io/colabres/log-reader:${{ env.IMAGE_TAG }}

      - name: Build and push ping-pong
        uses: docker/build-push-action@v6
        with:
          context: ./log-output/ping-pong
          push: true
          tags: ghcr.io/colabres/ping-pong:${{ env.IMAGE_TAG }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image versions
        run: |
          cd log-output
          kustomize edit set image log-writer=ghcr.io/colabres/log-writer:${{ env.IMAGE_TAG }}
          kustomize edit set image log-reader=ghcr.io/colabres/log-reader:${{ env.IMAGE_TAG }}
          kustomize edit set image ping-pong=ghcr.io/colabres/ping-pong:${{ env.IMAGE_TAG }}

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add log-output/kustomization.yaml
          git commit -m "Update log-output image versions [skip ci]" || echo "No changes to commit"
          git push